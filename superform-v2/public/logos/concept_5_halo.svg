<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="radialBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A1B12"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#radialBg)" stroke="#FAF8F4" stroke-width="2" stroke-opacity="0.08"/>
  <!-- Overlapping typography with modern offsets -->
  <text x="30" y="80" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="54" fill="#FAF8F4" letter-spacing="-0.05em">S</text>
  <text x="68" y="80" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="54" fill="#FAF8F4" letter-spacing="-0.05em">F</text>
  <!-- Beautiful orange glowing dot (the custom signature accent) positioned on the F crossbar -->
  <circle cx="98" cy="58" r="7.5" fill="#F59E0B"/>
</svg>
