<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Warm dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D0D" />
      <stop offset="100%" stop-color="#241B15" />
    </linearGradient>
    <!-- Vibrant light orange gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)" stroke="#FAF8F4" stroke-width="2" stroke-opacity="0.08"/>
  <text x="30" y="80" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="54" fill="#FAF8F4" letter-spacing="-0.05em">S</text>
  <text x="68" y="80" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="54" fill="url(#orangeGrad)" letter-spacing="-0.05em">F</text>
</svg>
