<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superform HTML Embed Test Laboratory</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      /* A gorgeous premium gradient to test transparency */
      background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 50%, #FEF9E7 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #0D0D0D;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin: 20px 0 5px 0;
      letter-spacing: -0.03em;
    }

    p {
      font-size: 0.95rem;
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .wrapper {
      max-width: 800px;
      width: 90%;
      margin: 0 auto 40px auto;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 32px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.05);
      overflow: hidden;
    }
  </style>
</head>

<body>
  <h1>Superform Embed Laboratory</h1>
  <p>The peach-pink canvas is our host website. Your form inherits this background transparently!</p>

  <div class="wrapper">
    <!-- Superform Embed -->
    <!-- Superform Embed -->
    <iframe src="http://localhost:3000/f/event-feedback-form-ie8sr?transparent=true"
      style="width: 100%; height: 600px; border: none; border-radius: 16px; display: block;" allow="clipboard-write">
    </iframe>
  </div>
</body>

</html>
