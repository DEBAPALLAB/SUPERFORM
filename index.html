<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hack House Nagpur 1.0 — Apply</title>
  <meta name="description" content="Apply to Hack House Nagpur 1.0 — a 48-hour build sprint for serious builders. Small group. Real output. No ideas, only code." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==============================
       ONBOARDING SCREEN
  ============================== -->
  <div id="onboarding" class="onboarding-wrapper">

    <!-- Reactbits Animated Canvas Background -->
    <canvas id="bg-canvas" class="bg-canvas" aria-hidden="true"></canvas>

    <!-- Grain overlay -->
    <div class="grain-overlay" aria-hidden="true"></div>

    <!-- Floating ambient orbs -->
    <div class="ambient-orb orb-1" aria-hidden="true"></div>
    <div class="ambient-orb orb-2" aria-hidden="true"></div>

    <!-- Top bar -->
    <header class="ob-header">
      <div class="ob-logo">
        <span class="logo-mark">◈</span>
        <span class="logo-text">Hack House</span>
      </div>
      <div class="ob-badge">Nagpur · 2025</div>
    </header>

    <!-- Main content -->
    <main class="ob-content">
      <div class="ob-eyebrow">
        <span class="eyebrow-line"></span>
        <span class="eyebrow-text">48-Hour Build Sprint</span>
        <span class="eyebrow-line"></span>
      </div>

      <h1 class="ob-title">
        Hack House<br />
        <em>Nagpur</em>
        <span class="ob-version">1.0</span>
      </h1>

      <p class="ob-descriptor">
        A small room. Real builders. 48 hours.<br />You either ship or you don't.
      </p>

      <div class="ob-meta">
        <div class="ob-meta-item">
          <span class="meta-label">Scale</span>
          <span class="meta-value">~10 people</span>
        </div>
        <div class="ob-meta-divider" aria-hidden="true"></div>
        <div class="ob-meta-item">
          <span class="meta-label">Duration</span>
          <span class="meta-value">48 hours</span>
        </div>
        <div class="ob-meta-divider" aria-hidden="true"></div>
        <div class="ob-meta-item">
          <span class="meta-label">Output</span>
          <span class="meta-value">Something real</span>
        </div>
      </div>

      <div class="ob-cta-group">
        <button id="apply-btn" class="ob-cta-btn" aria-label="Apply to Hack House Nagpur 1.0">
          <span class="cta-label">Apply Now</span>
          <span class="cta-arrow">→</span>
        </button>
        <p class="ob-cta-hint">Takes about 3 minutes. No fluff.</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="ob-footer">
      <span>Built in Nagpur, for builders.</span>
    </footer>

  </div>

  <!-- ==============================
       FORM SCREEN
  ============================== -->
  <div id="form-view" class="form-view hidden" aria-live="polite">

    <!-- Progress bar -->
    <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div id="progress-bar" class="progress-fill"></div>
    </div>

    <!-- Back button -->
    <button id="back-btn" class="back-btn hidden" aria-label="Go to previous question">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>

    <!-- Step container -->
    <div id="step-container" class="step-container">
      <!-- Steps are injected here by JS -->
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
